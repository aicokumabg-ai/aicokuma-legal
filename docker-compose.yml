version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aicokuma-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aicokuma-bot
    depends_on:
      - ollama
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - /dev/shm:/dev/shm
    shm_size: "2gb"
    restart: unless-stopped
    # Chromium이 display 없이 실행될 경우 가상 디스플레이 사용
    environment:
      - DISPLAY=:99

volumes:
  ollama_data:
